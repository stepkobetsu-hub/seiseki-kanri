<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#155aa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="面談メモ">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="site.webmanifest">
<title>面談メモ</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#eef3f8;
  color:#102033;
  font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
}
header{
  position:sticky;
  top:0;
  z-index:5;
  background:#fff;
  border-bottom:1px solid #d9e3ef;
  padding:14px 16px;
}
.head{
  max-width:980px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
h1{margin:0;font-size:1.22rem;letter-spacing:0}
.home{
  border:1px solid #cbd8e6;
  background:#f7fafc;
  color:#155aa5;
  border-radius:10px;
  padding:8px 10px;
  font-weight:800;
  text-decoration:none;
  font-size:.86rem;
}
main{max-width:980px;margin:0 auto;padding:14px}
.card{
  background:#fff;
  border:1px solid #d9e3ef;
  border-radius:14px;
  padding:16px;
  box-shadow:0 10px 24px rgba(31,52,78,.08);
  margin-bottom:14px;
}
.cardTitle{
  font-weight:900;
  font-size:1rem;
  margin-bottom:12px;
}
.campusGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:12px;
}
button,.btn{
  border:1px solid #cbd8e6;
  border-radius:10px;
  background:#f7fafc;
  color:#155aa5;
  padding:11px 12px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
}
button.primary,.btn.primary{
  background:#155aa5;
  color:#fff;
  border-color:#155aa5;
}
button.danger{background:#ef4444;color:#fff;border-color:#ef4444}
button.ghost{background:#eef4fb}
button:disabled{opacity:.55;cursor:not-allowed}
.formGrid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.field.full{grid-column:1/-1}
label{
  display:block;
  color:#52667c;
  font-weight:800;
  font-size:.82rem;
  margin-bottom:5px;
}
input,select,textarea{
  width:100%;
  border:1px solid #cbd8e6;
  border-radius:10px;
  background:#fff;
  color:#102033;
  padding:11px 12px;
  font:inherit;
  min-height:44px;
}
textarea{
  min-height:150px;
  line-height:1.65;
  resize:vertical;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.actions button{min-width:120px}
.filters{
  display:grid;
  grid-template-columns:auto 1fr 140px 1fr 140px 90px;
  gap:8px;
  margin-bottom:12px;
  align-items:center;
}
.campusFilter{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.campusFilter button{
  white-space:nowrap;
  padding:9px 12px;
  min-height:40px;
}
.memoList{
  display:grid;
  gap:10px;
}
.memo{
  border:1px solid #e0e8f2;
  border-radius:12px;
  padding:12px;
  background:#fbfdff;
}
.memoTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}
.studentName{font-weight:900;color:#155aa5}
.meta{
  color:#64748b;
  font-size:.82rem;
  line-height:1.7;
  margin-top:3px;
}
.content{
  margin-top:10px;
  white-space:pre-wrap;
  line-height:1.75;
}
.memoBtns{
  display:flex;
  gap:6px;
  flex:0 0 auto;
  align-items:center;
}
.memoBtns button{
  padding:5px 10px;
  min-height:28px;
  font-size:.78rem;
  border-radius:6px;
}
.memoBtns .btnBack{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.msg{
  margin-top:10px;
  color:#52667c;
  line-height:1.7;
  white-space:pre-wrap;
}
.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  background:#102033;
  color:#fff;
  border-radius:999px;
  padding:10px 16px;
  box-shadow:0 10px 24px rgba(0,0,0,.2);
  opacity:0;
  pointer-events:none;
  transition:opacity .16s ease;
  z-index:20;
}
.toast.show{opacity:1}
@media(max-width:760px){
  main{padding:10px}
  .card{padding:13px;border-radius:12px}
  .formGrid,.filters{grid-template-columns:1fr}
  .campusGrid{grid-template-columns:repeat(3,1fr)}
  .campusFilter button{flex:1}
  .campusGrid button{padding:11px 6px}
  .actions button{flex:1;min-width:0}
  .memoTop{display:block}
  .memoBtns{margin-top:10px}
  .memoBtns button{flex:1}
}
</style>
</head>
<body>
<header>
  <div class="head">
    <h1>面談メモ</h1>
    <a class="home" href="index.html">トップへ</a>
  </div>
</header>

<main>
  <section class="card">
    <div class="cardTitle" id="formTitle">面談・電話内容を登録</div>
    <div class="campusGrid">
      <button id="campusJinryo" type="button" onclick="selectCampus('神領')">神領</button>
      <button id="campusOte" type="button" onclick="selectCampus('大手')">大手町</button>
      <button id="campusAll" type="button" onclick="selectCampus('')">全校舎</button>
    </div>

    <div class="formGrid">
      <div class="field">
        <label for="gradeGroup">学年</label>
        <select id="gradeGroup" onchange="selectGradeGroup(this.value)">
          <option value="">全学年</option>
          <option value="elementary">小学生</option>
          <option value="junior">中学生</option>
          <option value="high">高校生</option>
          <option value="e13">小1〜小3</option>
          <option value="e46">小4〜小6</option>
          <option value="j1">中1</option>
          <option value="j2">中2</option>
          <option value="j3">中3</option>
          <option value="h13">高1〜高3</option>
        </select>
      </div>
      <div class="field">
        <label for="student">生徒名</label>
        <select id="student"></select>
      </div>
      <div class="field">
        <label for="date">日付</label>
        <input id="date" type="date">
      </div>
      <div class="field">
        <label for="counterpart">相手</label>
        <select id="counterpart" onchange="toggleOther()">
          <option value="母">母</option>
          <option value="父">父</option>
          <option value="本人">本人</option>
          <option value="他">他</option>
        </select>
      </div>
      <div class="field" id="otherWrap" style="display:none">
        <label for="other">相手（その他）</label>
        <input id="other" placeholder="例: 祖母、学校の先生">
      </div>
      <div class="field">
        <label for="staff">担当</label>
        <select id="staff" onchange="toggleStaffOther()"></select>
      </div>
      <div class="field" id="staffOtherWrap" style="display:none">
        <label for="staffOther">担当（その他）</label>
        <input id="staffOther" placeholder="担当者名を入力">
      </div>
      <div class="field full">
        <label for="content">内容</label>
        <textarea id="content" placeholder="面談・電話・相談内容など"></textarea>
      </div>
    </div>

    <div class="actions">
      <button id="saveBtn" class="primary" onclick="saveMemo(false)">保存する</button>
      <button id="mailSaveBtn" class="primary" onclick="saveMemo(true)">メール送信して保存</button>
      <button class="ghost" onclick="clearForm()">クリア</button>
    </div>
    <div id="formMsg" class="msg"></div>
  </section>

  <section class="card">
    <div class="cardTitle">面談メモ一覧</div>
    <div class="filters">
      <div class="campusFilter">
        <button id="filterCampusAll" class="primary" type="button" onclick="selectFilterCampus('')">全校舎</button>
        <button id="filterCampusJinryo" type="button" onclick="selectFilterCampus('神領')">神領</button>
        <button id="filterCampusOte" type="button" onclick="selectFilterCampus('大手')">大手町</button>
      </div>
      <input id="searchName" placeholder="名前で検索">
      <select id="filterStaff" onchange="renderMemos()">
        <option value="">担当者すべて</option>
        <option value="加瀬">加瀬</option>
        <option value="大野">大野</option>
        <option value="林">林</option>
        <option value="他">他</option>
      </select>
      <input id="searchContent" placeholder="内容で検索">
      <select id="filterCounterpart">
        <option value="">相手すべて</option>
        <option value="母">母</option>
        <option value="父">父</option>
        <option value="本人">本人</option>
        <option value="他">他</option>
      </select>
      <button onclick="loadMemos()">更新</button>
    </div>
    <div id="deleteNotice" style="display:none;margin-bottom:10px"></div>
    <div id="memoList" class="memoList"></div>
  </section>
</main>
<div id="toast" class="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec';
let students = [];
let staffMembers = [];
let memos = [];
let allMemos = [];
let currentCampus = '';
let currentGradeGroup = '';
let filterCampus = '';
let editingId = '';

function $(id){ return document.getElementById(id); }
function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function normalizeGrade(grade) {
  const s = String(grade || '')
    .trim()
    .replace(/[１２３４５６]/g, ch => ({'１':'1','２':'2','３':'3','４':'4','５':'5','６':'6'}[ch]))
    .replace(/\s+/g, '')
    .replace(/^小学/, '小')
    .replace(/^中学/, '中')
    .replace(/^高校/, '高')
    .replace(/年$/, '');
  const m = s.match(/^([小中高]?)([1-6])$/);
  if (!m) return s;
  return (m[1] || '中') + m[2];
}
function gradeMatchesGroup(grade, group) {
  if (!group) return true;
  const g = normalizeGrade(grade);
  const n = Number((g.match(/[1-6]/) || [''])[0]);
  if (group === 'elementary') return g.startsWith('小');
  if (group === 'junior') return g.startsWith('中');
  if (group === 'high') return g.startsWith('高');
  if (group === 'e13') return g.startsWith('小') && n >= 1 && n <= 3;
  if (group === 'e46') return g.startsWith('小') && n >= 4 && n <= 6;
  if (group === 'j1') return g === '中1';
  if (group === 'j2') return g === '中2';
  if (group === 'j3') return g === '中3';
  if (group === 'h13') return g.startsWith('高') && n >= 1 && n <= 3;
  return true;
}
function today(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function showToast(text){
  const el = $('toast');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}
async function api(data){
  const res = await fetch(GAS, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(data) });
  return await res.json();
}

async function init(){
  $('date').value = today();
  selectCampus('');
  $('searchName').addEventListener('input', debounce(renderMemos, 250));
  $('filterStaff').addEventListener('change', renderMemos);
  $('searchContent').addEventListener('input', debounce(renderMemos, 250));
  $('filterCounterpart').addEventListener('change', renderMemos);
  try {
    const [sr, fr] = await Promise.all([
      api({ action:'getStudents' }),
      api({ action:'getStaffMembers' })
    ]);
    students = sr.students || [];
    staffMembers = fr.staff || [];
    // 名前datalistを生成
    updateNameDatalist();
    renderStudents();
    renderStaff();
    await loadMemos();
  } catch (e) {
    $('formMsg').textContent = '読み込みに失敗しました。通信状態を確認してください。';
  }
}

function debounce(fn, wait){
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), wait);
  };
}

function selectCampus(campus){
  currentCampus = campus || '';
  [['campusJinryo','神領'],['campusOte','大手'],['campusAll','']].forEach(([id,value]) => {
    const btn = $(id);
    if (!btn) return;
    btn.classList.toggle('primary', currentCampus === value);
  });
  renderStudents();
}

function selectGradeGroup(group){
  currentGradeGroup = group || '';
  renderStudents();
}

function selectFilterCampus(campus){
  filterCampus = campus || '';
  [['filterCampusAll',''],['filterCampusJinryo','神領'],['filterCampusOte','大手']].forEach(([id,value]) => {
    const btn = $(id);
    if (!btn) return;
    btn.classList.toggle('primary', filterCampus === value);
  });
  if (allMemos.length) { renderMemos(); } else { loadMemos(); }
  // 名前datalistを校舎で絞る
  updateNameDatalist();
}

function updateNameDatalist(){
  const sel = $('searchName');
  if (!sel) return;
  const prev = sel.value;
  const list = filterCampus ? students.filter(s => s.campus === filterCampus) : students;
  sel.innerHTML = '<option value="">生徒名（すべて）</option>' + list.map(s => `<option value="${esc(s.name)}">${esc(s.name)}</option>`).join('');
  if (list.some(s => s.name === prev)) sel.value = prev;
}

function renderStudents(){
  const prev = $('student').value;
  let list = currentCampus ? students.filter(s => s.campus === currentCampus) : students;
  if (currentGradeGroup) list = list.filter(s => gradeMatchesGroup(s.grade, currentGradeGroup));
  $('student').innerHTML = '<option value="">生徒を選択</option>' + list.map(s =>
    `<option value="${esc(s.id)}">${esc(s.name)}（${esc(s.grade || '')} / No.${esc(s.id)}）</option>`
  ).join('');
  if (prev) $('student').value = prev;
}

function renderStaff(){
  $('staff').innerHTML = '<option value="">担当を選択</option>' + staffMembers.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('') + '<option value="他">他</option>';
  toggleStaffOther();
}

function toggleOther(){
  const isOther = $('counterpart').value === '他';
  $('otherWrap').style.display = isOther ? '' : 'none';
  if (!isOther) $('other').value = '';
}

function buildCounterpart(){
  const base = $('counterpart').value;
  const other = $('other').value.trim();
  return base === '他' && other ? `他: ${other}` : base;
}

function toggleStaffOther(){
  const isOther = $('staff').value === '他';
  $('staffOtherWrap').style.display = isOther ? '' : 'none';
  if (!isOther) $('staffOther').value = '';
}

function buildStaff(){
  const base = $('staff').value;
  const other = $('staffOther').value.trim();
  return base === '他' ? other : base;
}

async function saveMemo(sendEmail){
  const staff = buildStaff();
  const payload = {
    action:'saveMeetingMemo',
    id: editingId,
    date: $('date').value,
    studentId: $('student').value,
    counterpart: buildCounterpart(),
    staff,
    content: $('content').value.trim(),
    sendEmail: !!sendEmail
  };
  if (!payload.studentId) { showToast('生徒を選択してください'); return; }
  if (!payload.staff) { showToast('担当者を選択または入力してください'); return; }
  if (!payload.content) { showToast('内容を入力してください'); return; }
  $('saveBtn').disabled = true;
  if ($('mailSaveBtn')) $('mailSaveBtn').disabled = true;
  try {
    const r = await api(payload);
    if (!r.success) throw new Error(r.error || '保存に失敗しました');
    if (sendEmail) {
      showToast(r.email && r.email.sent ? '保存し、メール送信しました' : '保存しました（メール送信なし）');
    } else {
      showToast(editingId ? '更新しました' : '保存しました');
    }
    clearForm(true);
    await loadMemos();
  } catch (e) {
    showToast(e.message || '保存に失敗しました');
  } finally {
    $('saveBtn').disabled = false;
    if ($('mailSaveBtn')) $('mailSaveBtn').disabled = false;
  }
}

function clearForm(keepStudent){
  editingId = '';
  $('formTitle').textContent = '面談・電話内容を登録';
  $('saveBtn').textContent = '保存する';
  if (!keepStudent) $('student').value = '';
  $('date').value = today();
  $('counterpart').value = '母';
  $('other').value = '';
  $('staff').value = '';
  $('staffOther').value = '';
  $('content').value = '';
  toggleOther();
  toggleStaffOther();
}

async function loadMemos(){
  $('memoList').innerHTML = '<div class="msg">読み込み中...</div>';
  try {
    const r = await api({ action:'getMeetingMemos' });
    allMemos = r.memos || [];
    renderMemos();
  } catch (e) {
    $('memoList').innerHTML = '<div class="msg">一覧を読み込めませんでした。</div>';
  }
}

function renderMemos(){
  const qName    = ($('searchName')?.value || '').trim();
  const qStaff   = ($('filterStaff')?.value || '').trim();
  const qContent = ($('searchContent')?.value || '').trim().toLowerCase();
  const qCounterpart = $('filterCounterpart')?.value || '';

  let filtered = (allMemos || memos).filter(m => {
    if (filterCampus && String(m.campus || '') !== filterCampus) return false;
    if (qName    && !(m.name || '').includes(qName)) return false;
    if (qStaff) {
      if (qStaff === '他') { if (['加瀬','大野','林'].includes(m.staff || '')) return false; }
      else if ((m.staff || '') !== qStaff) return false;
    }
    if (qContent && !(m.content || '').toLowerCase().includes(qContent)) return false;
    if (qCounterpart) {
      if (qCounterpart === '他') { if (!String(m.counterpart||'').startsWith('他')) return false; }
      else if (m.counterpart !== qCounterpart) return false;
    }
    return true;
  });

  // 最新順（日付降順→登録日時降順）
  filtered.sort((a, b) => String(b.date).localeCompare(String(a.date)) || String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
  memos = filtered;

  if (!memos.length) {
    $('memoList').innerHTML = '<div class="msg">面談メモはありません。</div>';
    return;
  }
  $('memoList').innerHTML = memos.map(m => `
    <article class="memo">
      <div class="memoTop">
        <div>
          <div class="studentName">${esc(m.name)} <span class="meta">No.${esc(m.studentId)} / ${esc(m.grade || '')}</span></div>
          <div class="meta">${esc(formatDate(m.date))}　${esc(m.counterpart || '')}　担当: ${esc(m.staff || '')}</div>
        </div>
        <div class="memoBtns">
          <button class="btnBack" onclick="editMemo('${esc(m.id)}')">編集</button>
          <button class="danger" style="padding:5px 8px;font-size:.78rem;min-height:28px;border-radius:6px" onclick="deleteMemo('${esc(m.id)}')">削除</button>
        </div>
      </div>
      <div class="content">${esc(m.content || '')}</div>
    </article>
  `).join('');
}

function formatDate(v){
  if (!v) return '';
  const s = String(v);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const d = new Date(v);
  if (!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return s;
}

function editMemo(id){
  const m = memos.find(x => String(x.id) === String(id));
  if (!m) return;
  editingId = m.id;
  $('formTitle').textContent = '面談メモを編集';
  $('saveBtn').textContent = '変更を保存';
  currentGradeGroup = '';
  if ($('gradeGroup')) $('gradeGroup').value = '';
  selectCampus(m.campus || '');
  $('student').value = m.studentId || '';
  $('date').value = formatDate(m.date).replace(/\//g,'-');
  const cp = String(m.counterpart || '');
  if (['母','父','本人'].includes(cp)) {
    $('counterpart').value = cp;
    $('other').value = '';
  } else {
    $('counterpart').value = '他';
    $('other').value = cp.replace(/^他[:：]\s*/, '');
  }
  toggleOther();
  const staff = String(m.staff || '');
  if (staff && staffMembers.includes(staff)) {
    $('staff').value = staff;
    $('staffOther').value = '';
  } else if (staff) {
    $('staff').value = '他';
    $('staffOther').value = staff;
  } else {
    $('staff').value = '';
    $('staffOther').value = '';
  }
  toggleStaffOther();
  $('content').value = m.content || '';
  window.scrollTo({ top:0, behavior:'smooth' });
}

let deletedHistory = [];

function renderDeleteNotice(){
  const box = $('deleteNotice');
  if (!deletedHistory.length){ box.style.display='none'; return; }
  box.style.display='block';
  box.innerHTML = deletedHistory.map((item,i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e8eef5;font-size:.83rem;color:#475569">
      <span style="flex:1">${esc(item.name)}さん（${esc(formatDate(item.date))}）のメモを削除しました</span>
      <button style="padding:5px 12px;font-size:.8rem;border-radius:5px;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;cursor:pointer" onclick="hardDelete(${i})">完全削除</button>
      <button style="padding:5px 14px;font-size:.8rem;border-radius:5px;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;cursor:pointer" onclick="undoDelete(${i})">戻す</button>
    </div>
  `).join('');
}

function deleteMemo(id){
  const target = allMemos.find(m => String(m.id) === String(id));
  if (!target) return;
  if (String(editingId) === String(id)) clearForm();
  // GASには触らず画面から隠すだけ
  allMemos = allMemos.filter(m => String(m.id) !== String(id));
  deletedHistory.push(target);
  renderMemos();
  renderDeleteNotice();
}

async function hardDelete(i){
  const item = deletedHistory[i];
  if (!item) return;
  if (!confirm(`${item.name}さんのメモを完全に削除します。この操作は取り消せません。よろしいですか？`)) return;
  try {
    const r = await api({ action:'deleteMeetingMemo', id: item.id });
    if (!r.success) throw new Error(r.error || '削除に失敗しました');
    deletedHistory.splice(i, 1);
    renderDeleteNotice();
    showToast('完全削除しました');
  } catch(e) {
    showToast(e.message || '削除に失敗しました');
  }
}

function undoDelete(i){
  const item = deletedHistory[i];
  if (!item) return;
  // GASには触らず画面に戻すだけ
  allMemos.push(item);
  deletedHistory.splice(i, 1);
  renderMemos();
  renderDeleteNotice();
  showToast('元に戻しました');
}

init();
</script>

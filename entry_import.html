<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入塾書類取込</title>
<style>
:root{--primary:#1a56a0;--bg:#f3f6fb;--text:#172033;--sub:#64748b;--border:#d8e0ea;--card:#fff;--ok:#10b981;--warn:#f59e0b;--err:#ef4444}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Meiryo",sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;font-weight:800;color:var(--primary)}
main{max-width:920px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:0 4px 16px rgba(15,23,42,.06)}
.head{font-weight:800;margin-bottom:10px;color:#0f172a}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
label{display:block;font-size:.78rem;color:var(--sub);font-weight:700;margin:0 0 4px}
input,textarea,select{width:100%;border:1px solid var(--border);border-radius:7px;padding:10px;font-size:16px;background:#fff;color:var(--text)}
textarea{min-height:82px;resize:vertical;font-family:inherit}
.json{font-family:Consolas,monospace;font-size:.82rem;min-height:170px}
.btn{border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-weight:800;cursor:pointer;background:#fff;color:var(--primary)}
.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.ghost{background:#eef4fb}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.preview{width:100%;max-height:240px;object-fit:contain;background:#f8fafc;border:1px dashed var(--border);border-radius:7px;margin-top:8px}
.msg{font-size:.85rem;color:var(--sub);line-height:1.7}
.ok{color:var(--ok)}.err{color:var(--err)}
.small{font-size:.78rem;color:var(--sub)}
@media(max-width:680px){.grid,.grid3{grid-template-columns:1fr}main{padding:10px}.card{padding:12px}header{font-size:.95rem}}
</style>
</head>
<body>
<header>入塾書類取込</header>
<main>
  <div class="card">
    <div class="head">本人確認</div>
    <div class="grid">
      <div><label>生徒ID</label><input id="studentId" inputmode="numeric" placeholder="例: 1000"></div>
      <div><label>生徒氏名</label><input id="studentName" placeholder="例: 大野智子"></div>
    </div>
    <p class="small">生徒IDと氏名が一致しない場合は保存されません。</p>
  </div>

  <div class="card">
    <div class="head">写真</div>
    <div class="grid">
      <div>
        <label>エントリーシート</label>
        <input id="image1" type="file" accept="image/*" capture="environment" onchange="previewImage(this,'preview1')">
        <img id="preview1" class="preview" alt="">
      </div>
      <div>
        <label>成績・志望校シート</label>
        <input id="image2" type="file" accept="image/*" capture="environment" onchange="previewImage(this,'preview2')">
        <img id="preview2" class="preview" alt="">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="head">生徒マスタへ反映する右側保護者欄（Z〜AD列）</div>
    <div class="grid">
      <div><label>右 保護者氏名</label><input id="guardian2Name"></div>
      <div><label>右 フリガナ</label><input id="guardian2Kana"></div>
      <div><label>右 続柄</label><input id="guardian2Relation"></div>
      <div><label>右 メール</label><input id="guardian2Email" type="email"></div>
      <div><label>右 携帯電話番号</label><input id="guardian2Mobile" inputmode="tel"></div>
    </div>
  </div>

  <div class="card">
    <div class="head">保護者署名欄より下の情報</div>
    <div class="grid">
      <div><label>部活動</label><input id="club"></div>
      <div><label>ニックネーム</label><input id="nickname"></div>
      <div><label>通塾方法</label><input id="commuteMethod"></div>
      <div><label>保護者署名日</label><input id="signatureDate"></div>
      <div><label>保護者署名氏名</label><input id="signatureName"></div>
    </div>
    <div style="margin-top:10px">
      <label>現在通っている習い事や塾</label>
      <textarea id="currentLessons"></textarea>
    </div>
    <div style="margin-top:10px">
      <label>過去に通っていた習い事や塾</label>
      <textarea id="pastLessons"></textarea>
    </div>
    <div style="margin-top:10px">
      <label>ご家庭からの要望・希望</label>
      <textarea id="familyRequest"></textarea>
    </div>
    <div style="margin-top:10px">
      <label>家族情報JSON</label>
      <textarea id="familyJson" class="json" placeholder='[{"name":"加瀬俊介","relation":"父","job":"社長","workplace":"個別指導ステップ","grade":""}]'></textarea>
    </div>
  </div>

  <div class="card">
    <div class="head">OCR結果JSON / 成績・通知表・志望校</div>
    <textarea id="entryJson" class="json" placeholder='{"scores":[{"year":2026,"term":1,"jpn":58,"soc":77,"math":66,"sci":55,"eng":44,"total5":300}],"reports":[{"year":2026,"semester":"1学期","rp_jpn":5,"rp_soc":5,"rp_math":5,"rp_sci":5,"rp_eng":5}],"wish":{"pub1name":"春日井高校","pub1dept":"ふつう"}}'></textarea>
    <div class="row" style="margin-top:10px">
      <button class="btn ghost" onclick="fillFromJson()">JSONをフォームへ反映</button>
      <button class="btn primary" onclick="submitEntry()">画像保存して取り込む</button>
    </div>
    <div id="msg" class="msg" style="margin-top:10px"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec';

async function api(data) {
  const r = await fetch(GAS, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(data) });
  return await r.json();
}

function v(id) { return document.getElementById(id).value.trim(); }
function setv(id, value) { if (value != null) document.getElementById(id).value = value; }
function msg(text, cls) { const el = document.getElementById('msg'); el.className = 'msg ' + (cls || ''); el.textContent = text; }

function previewImage(input, previewId) {
  const file = input.files && input.files[0];
  const img = document.getElementById(previewId);
  if (!file) { img.removeAttribute('src'); return; }
  img.src = URL.createObjectURL(file);
}

function parseJson() {
  const raw = v('entryJson');
  if (!raw) return {};
  return JSON.parse(raw);
}

function fillFromJson() {
  try {
    const d = parseJson();
    if (Array.isArray(d)) {
      setv('familyJson', JSON.stringify(d, null, 2));
      msg('家族情報JSONをフォームへ反映しました。', 'ok');
      return;
    }
    const map = [
      'guardian2Name','guardian2Kana','guardian2Relation','guardian2Email','guardian2Mobile',
      'club','nickname','commuteMethod','signatureDate','signatureName',
      'currentLessons','pastLessons','familyRequest'
    ];
    map.forEach(k => setv(k, d[k]));
    if (d.family) setv('familyJson', JSON.stringify(d.family, null, 2));
    msg('JSONをフォームへ反映しました。内容を確認して取り込んでください。', 'ok');
  } catch(e) {
    msg('JSONの形式を確認してください: ' + e.message, 'err');
  }
}

async function resizeImage(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = dataUrl;
  });
  const max = 1600;
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(img.width * scale);
  canvas.height = Math.round(img.height * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.82);
}

async function uploadImage(inputId, label) {
  const input = document.getElementById(inputId);
  const file = input.files && input.files[0];
  if (!file) return '';
  msg(label + 'を保存中...');
  const imageData = await resizeImage(file);
  const r = await api({
    action:'uploadEntryImage',
    studentId:v('studentId'),
    name:v('studentName'),
    label,
    imageData
  });
  if (!r.success) throw new Error(r.error || label + 'の保存に失敗しました');
  return r.url;
}

async function makePdfDataUrl() {
  const files = ['image1','image2'].map(id => {
    const input = document.getElementById(id);
    return input.files && input.files[0] ? input.files[0] : null;
  }).filter(Boolean);
  if (!files.length) return '';
  if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('PDF作成ライブラリを読み込めませんでした。通信状態を確認してください。');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  for (let i = 0; i < files.length; i++) {
    if (i > 0) pdf.addPage();
    const imageData = await resizeImage(files[i]);
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = imageData;
    });
    const pageW = 210, pageH = 297, margin = 8;
    const maxW = pageW - margin * 2;
    const maxH = pageH - margin * 2;
    const ratio = Math.min(maxW / img.width, maxH / img.height);
    const w = img.width * ratio;
    const h = img.height * ratio;
    const x = (pageW - w) / 2;
    const y = (pageH - h) / 2;
    pdf.addImage(imageData, 'JPEG', x, y, w, h);
  }
  return pdf.output('datauristring');
}

async function uploadPdf() {
  const hasImage = ['image1','image2'].some(id => {
    const input = document.getElementById(id);
    return input.files && input.files[0];
  });
  if (!hasImage) return '';
  msg('PDFを作成して保存中...');
  const pdfData = await makePdfDataUrl();
  const r = await api({
    action:'uploadEntryPdf',
    studentId:v('studentId'),
    name:v('studentName'),
    pdfData
  });
  if (!r.success) throw new Error(r.error || 'PDFの保存に失敗しました');
  return r.url;
}

function buildPayload(imageUrl1, imageUrl2, pdfUrl) {
  let extra = {};
  try { extra = parseJson(); } catch(e) { throw new Error('OCR結果JSONの形式を確認してください: ' + e.message); }
  let family = [];
  const familyRaw = v('familyJson');
  if (familyRaw) family = JSON.parse(familyRaw);
  else if (Array.isArray(extra)) { family = extra; extra = {}; }
  else if (Array.isArray(extra.family)) family = extra.family;
  const pick = key => v(key) || extra[key] || '';
  return Object.assign({}, extra, {
    action:'importEntrySheet',
    studentId:v('studentId') || extra.studentId,
    name:v('studentName') || extra.name,
    guardian2Name:pick('guardian2Name'),
    guardian2Kana:pick('guardian2Kana'),
    guardian2Relation:pick('guardian2Relation'),
    guardian2Email:pick('guardian2Email'),
    guardian2Mobile:pick('guardian2Mobile'),
    club:pick('club'),
    nickname:pick('nickname'),
    commuteMethod:pick('commuteMethod'),
    signatureDate:pick('signatureDate'),
    signatureName:pick('signatureName'),
    currentLessons:pick('currentLessons'),
    pastLessons:pick('pastLessons'),
    familyRequest:pick('familyRequest'),
    imageUrl1:imageUrl1 || extra.imageUrl1 || '',
    imageUrl2:imageUrl2 || extra.imageUrl2 || '',
    pdfUrl:pdfUrl || extra.pdfUrl || '',
    family
  });
}

async function submitEntry() {
  try {
    if (!v('studentId') || !v('studentName')) { msg('生徒IDと氏名を入力してください。', 'err'); return; }
    const pdfUrl = await uploadPdf();
    const imageUrl1 = await uploadImage('image1', 'entry_sheet');
    const imageUrl2 = await uploadImage('image2', 'grade_sheet');
    msg('取り込み中...');
    const payload = buildPayload(imageUrl1, imageUrl2, pdfUrl);
    const r = await api(payload);
    if (!r.success) { msg(r.error || '取り込みに失敗しました。', 'err'); return; }
    msg((r.message || '取り込みました') + '（' + (r.saved || []).join(', ') + '）', 'ok');
  } catch(e) {
    msg(e.message, 'err');
  }
}
</script>
</body>
</html>

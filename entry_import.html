<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入塾書類取込</title>
<style>
:root{--primary:#1a56a0;--bg:#f3f6fb;--text:#172033;--sub:#64748b;--border:#d8e0ea;--card:#fff;--ok:#10b981;--err:#ef4444}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Meiryo",sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;font-weight:800;color:var(--primary)}
main{max-width:760px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(15,23,42,.06)}
.head{font-weight:800;margin-bottom:10px;color:#0f172a}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
label{display:block;font-size:.82rem;color:var(--sub);font-weight:700;margin:0 0 5px}
input{width:100%;border:1px solid var(--border);border-radius:7px;padding:10px;font-size:16px;background:#fff;color:var(--text)}
.btn{border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-weight:800;cursor:pointer;background:#fff;color:var(--primary);font-size:1rem}
.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.ghost{background:#eef4fb}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.preview{width:100%;max-height:260px;object-fit:contain;background:#f8fafc;border:1px dashed var(--border);border-radius:7px;margin-top:8px}
.msg{font-size:.92rem;color:var(--sub);line-height:1.75;white-space:pre-wrap}
.ok{color:var(--ok)}.err{color:var(--err)}
.small{font-size:.82rem;color:var(--sub);line-height:1.7}
.idBox{font-size:1.8rem;font-weight:900;color:#0f172a;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0}
.hidden{display:none!important}
details{margin-top:10px}
textarea{width:100%;min-height:100px;border:1px solid var(--border);border-radius:7px;padding:10px;font-family:Consolas,monospace;font-size:.8rem;color:#475569}
@media(max-width:680px){.grid{grid-template-columns:1fr}main{padding:10px}.card{padding:14px}header{font-size:.95rem}.btn{width:100%}}
</style>
</head>
<body>
<header>入塾書類取込</header>
<main>
  <div class="card">
    <div class="head">写真を保存する</div>
    <p class="small">スマホでは細かい訂正はしません。エントリーシート上部の生徒番号だけ読み取り、原本PDF/画像をその生徒の入塾時情報へ <b>NEW</b> として保存します。</p>
    <div class="grid">
      <div>
        <label>エントリーシート</label>
        <input id="image1" type="file" accept="image/*" capture="environment" onchange="previewImage(this,'preview1')">
        <img id="preview1" class="preview" alt="">
      </div>
      <div>
        <label>成績・志望校シート</label>
        <input id="image2" type="file" accept="image/*" capture="environment" onchange="previewImage(this,'preview2')">
        <img id="preview2" class="preview" alt="">
      </div>
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn primary" onclick="saveToStudent()">生徒番号を読んで保存</button>
    </div>
    <div id="msg" class="msg" style="margin-top:12px"></div>
  </div>

  <div id="confirmCard" class="card hidden">
    <div class="head">読み取った生徒番号</div>
    <div id="studentIdBox" class="idBox"></div>
    <p class="small">この番号の生徒の入塾時情報に、原本PDF/画像をNEWとして保存しました。管理画面で開いて確認してください。</p>
    <details>
      <summary class="small">読み取りテキスト</summary>
      <textarea id="ocrText" readonly></textarea>
    </details>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec';

async function api(data) {
  const r = await fetch(GAS, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(data) });
  return await r.json();
}
function el(id){ return document.getElementById(id); }
function msg(text, cls){ const m=el('msg'); m.className='msg '+(cls||''); m.textContent=text; }
function fileOf(id){ const input=el(id); return input.files && input.files[0] ? input.files[0] : null; }

function previewImage(input, previewId) {
  const file = input.files && input.files[0];
  const img = el(previewId);
  if (!file) { img.removeAttribute('src'); return; }
  img.src = URL.createObjectURL(file);
}

async function imageToCanvas(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = dataUrl;
  });
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  canvas.getContext('2d').drawImage(img, 0, 0);
  return canvas;
}

async function cropStudentNumber(file) {
  const src = await imageToCanvas(file);
  const w = src.width, h = src.height;
  const crop = document.createElement('canvas');
  const sx = Math.round(w * 0.64);
  const sy = Math.round(h * 0.02);
  const sw = Math.round(w * 0.34);
  const sh = Math.round(h * 0.18);
  crop.width = sw * 2;
  crop.height = sh * 2;
  const ctx = crop.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, crop.width, crop.height);
  ctx.drawImage(src, sx, sy, sw, sh, 0, 0, crop.width, crop.height);
  return crop;
}

async function readStudentId() {
  const file = fileOf('image1');
  if (!file) throw new Error('エントリーシートの写真を選んでください。');
  if (!window.Tesseract) throw new Error('読み取り機能を読み込めませんでした。通信状態を確認してください。');
  msg('生徒番号の部分だけを読み取っています...');
  const crop = await cropStudentNumber(file);
  const result = await Tesseract.recognize(crop, 'jpn+eng');
  const text = result.data.text || '';
  el('ocrText').value = text;
  const id = pickStudentId(text);
  if (!id) throw new Error('生徒番号を読み取れませんでした。写真の上部右側「生徒番号」が写るように撮り直してください。');
  return id;
}

function pickStudentId(text) {
  const normalized = String(text || '').replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
  const lines = normalized.split(/\n/).map(s => s.trim()).filter(Boolean);
  for (const line of lines) {
    if (/生徒|番号|ID/i.test(line)) {
      const nums = line.match(/\d{3,5}/g) || [];
      const good = nums.find(n => !/^20\d{2}$/.test(n) && !/^19\d{2}$/.test(n));
      if (good) return good;
    }
  }
  const nums = normalized.match(/\d{3,5}/g) || [];
  const candidates = nums.filter(n => !/^20\d{2}$/.test(n) && !/^19\d{2}$/.test(n));
  const preferred = candidates.find(n => /^1\d{3}$/.test(n));
  return preferred || candidates[0] || '';
}

async function resizeImage(file) {
  const src = await imageToCanvas(file);
  const max = 1600;
  const scale = Math.min(1, max / Math.max(src.width, src.height));
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(src.width * scale);
  canvas.height = Math.round(src.height * scale);
  canvas.getContext('2d').drawImage(src, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.82);
}

async function uploadImage(studentId, inputId, label) {
  const file = fileOf(inputId);
  if (!file) return '';
  const r = await api({ action:'uploadEntryImage', studentId, name:'', label, imageData:await resizeImage(file) });
  if (!r.success) throw new Error(r.error || label + 'の保存に失敗しました');
  return r.url;
}

async function makePdfDataUrl() {
  const files = [fileOf('image1'), fileOf('image2')].filter(Boolean);
  if (!files.length) return '';
  if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('PDF作成機能を読み込めませんでした。通信状態を確認してください。');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  for (let i = 0; i < files.length; i++) {
    if (i > 0) pdf.addPage();
    const imageData = await resizeImage(files[i]);
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = imageData;
    });
    const pageW = 210, pageH = 297, margin = 8;
    const ratio = Math.min((pageW - margin * 2) / img.width, (pageH - margin * 2) / img.height);
    const w = img.width * ratio, h = img.height * ratio;
    pdf.addImage(imageData, 'JPEG', (pageW - w) / 2, (pageH - h) / 2, w, h);
  }
  return pdf.output('datauristring');
}

async function uploadPdf(studentId) {
  if (![fileOf('image1'), fileOf('image2')].some(Boolean)) return '';
  const r = await api({ action:'uploadEntryPdf', studentId, name:'', pdfData:await makePdfDataUrl() });
  if (!r.success) throw new Error(r.error || 'PDFの保存に失敗しました');
  return r.url;
}

async function saveToStudent() {
  try {
    const studentId = await readStudentId();
    if (!confirm('生徒番号 ' + studentId + ' の入塾時情報に、原本PDF/画像をNEWとして保存します。よろしいですか？')) return;
    msg('PDFと画像を保存しています...');
    const pdfUrl = await uploadPdf(studentId);
    const imageUrl1 = await uploadImage(studentId, 'image1', 'entry_sheet');
    const imageUrl2 = await uploadImage(studentId, 'image2', 'grade_sheet');
    msg('成績管理DBへ登録しています...');
    const r = await api({
      action:'importEntrySheet',
      studentId,
      ocrMemo:'NEW: スマホ取込。原本PDF/画像を確認してください。\n' + (el('ocrText').value || ''),
      pdfUrl,
      imageUrl1,
      imageUrl2
    });
    if (!r.success) { msg(r.error || '保存に失敗しました。', 'err'); return; }
    el('studentIdBox').textContent = studentId + '  NEW';
    el('confirmCard').classList.remove('hidden');
    msg('保存しました。管理画面でこの生徒の「入塾時情報」を開いて確認してください。' + (r.warning ? '\n' + r.warning : ''), 'ok');
  } catch(e) {
    msg(e.message, 'err');
  }
}
</script>
</body>
</html>

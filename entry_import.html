<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入塾書類AI読取</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f0;color:#2c2c2a;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif}
header{background:#fff;border-bottom:1px solid #e0dfd8;padding:14px 18px;font-weight:700;color:#1a56a0}
main{max-width:980px;margin:22px auto;padding:0 14px}.card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:16px;margin-bottom:14px}
h2{font-size:1rem;margin:0 0 12px}.small{font-size:.84rem;color:#64748b;line-height:1.7}
#drop{border:2px dashed #c0bfb8;border-radius:10px;padding:26px 12px;text-align:center;background:#faf9f6;cursor:pointer}
#drop.drag{border-color:#1a56a0;background:#eef4fb}.btn{border:1px solid #d0cfc8;border-radius:8px;background:#fff;color:#1a56a0;padding:10px 14px;font-weight:700;cursor:pointer}
.primary{background:#1a56a0;color:#fff;border-color:#1a56a0}.success{background:#1D9E75;color:#fff;border-color:#1D9E75}.btn:disabled{opacity:.45}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.queue{display:flex;flex-direction:column;gap:8px;margin-top:12px}.q{display:flex;gap:10px;align-items:center;background:#faf9f6;border:1px solid #e8e6de;border-radius:8px;padding:9px 10px;font-size:.86rem}
.q span:first-child{flex:1}.badge{border-radius:999px;padding:3px 9px;font-size:.75rem;font-weight:700;background:#f1efe8;color:#666}.done{background:#EAF3DE;color:#3B6D11}.err{background:#FCEBEB;color:#A32D2D}.doing{background:#EEEDFE;color:#534AB7}
.tableWrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:900px}th{background:#1a56a0;color:#fff;text-align:left;padding:8px;white-space:nowrap}td{border-bottom:1px solid #edf2f7;padding:7px;vertical-align:top}tr:nth-child(even) td{background:#fafafa}
textarea{width:100%;min-height:120px;border:1px solid #d8e0ea;border-radius:8px;padding:10px;font-family:Consolas,monospace;font-size:.78rem}.hidden{display:none!important}.msg{white-space:pre-wrap;color:#64748b;line-height:1.7;font-size:.9rem}
@media(max-width:680px){main{margin-top:12px}.btn{width:100%}table{font-size:.78rem}}
</style>
</head>
<body>
<header>入塾書類AI読取</header>
<main>
  <div class="card">
    <h2>写真・PDFをアップロード</h2>
    <p class="small">入塾時に提出された書類をAIで読み取り、同じ生徒番号の成績管理DBへ保存します。スマホでは修正しません。読み取り結果は管理画面で確認します。</p>
    <div id="drop" onclick="fileInput.click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
      クリックまたはドラッグして画像/PDFを選択<br><b>エントリーシートと成績・志望校シートをまとめて選択できます</b>
    </div>
    <input id="fileInput" type="file" accept="image/*,.pdf" multiple style="display:none" onchange="addFiles(this.files)">
    <div id="queue" class="queue"></div>
    <div class="row" style="margin-top:12px">
      <button id="readBtn" class="btn primary" onclick="startRead()">AIで読み取る</button>
      <button id="saveBtn" class="btn success" onclick="saveAll()" disabled>読み取り結果を保存</button>
    </div>
    <div id="msg" class="msg" style="margin-top:10px"></div>
  </div>

  <div id="resultCard" class="card hidden">
    <h2>読み取り結果</h2>
    <div class="tableWrap">
      <table>
        <thead><tr><th>#</th><th>生徒番号</th><th>氏名</th><th>部活</th><th>家族</th><th>保護者2</th><th>成績/志望校</th><th>状態</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <details style="margin-top:12px">
      <summary class="small">AI JSONを確認</summary>
      <textarea id="jsonBox" readonly></textarea>
    </details>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec';
const AI_API = 'https://juku-card-system.onrender.com/api/read-card';
let fileGroups = [];
let results = [];

function $(id){return document.getElementById(id)}
function say(t, cls){$('msg').className='msg '+(cls||'');$('msg').textContent=t}
async function api(data){const r=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});return await r.json()}
function handleDrop(e){e.preventDefault();$('drop').classList.remove('drag');addFiles(e.dataTransfer.files)}
function addFiles(files){fileGroups=[{files:[...files],status:'待機中',data:null,error:''}];renderQueue();$('saveBtn').disabled=true;results=[];renderResults()}
function renderQueue(){const q=$('queue');q.innerHTML=fileGroups.map((g,i)=>`<div class="q"><span>${g.files.map(f=>f.name).join(' / ')}</span><span class="badge ${g.status==='完了'?'done':g.status==='エラー'?'err':g.status==='読み取り中'?'doing':''}">${g.status}</span></div>`).join('')}

async function startRead(){
  if(!fileGroups.length){say('先に画像またはPDFを選択してください','err');return}
  $('readBtn').disabled=true;$('saveBtn').disabled=true;results=[];
  for(let i=0;i<fileGroups.length;i++){
    const group=fileGroups[i];group.status='読み取り中';renderQueue();say('AIで読み取っています。少し時間がかかります。');
    try{group.data=await readEntrySheets(group.files);group.status='完了';results[i]=group.data}
    catch(e){group.status='エラー';group.error=e.message;results[i]={error:e.message}}
    renderQueue();renderResults();
  }
  $('readBtn').disabled=false;$('saveBtn').disabled=!results.some(r=>r && !r.error && r.studentId);
  say('読み取りが終わりました。内容は管理画面で確認できます。保存する場合は「読み取り結果を保存」を押してください。','ok');
}

async function readEntrySheets(files){
  const content=[];
  for(const file of files){
    content.push({type:file.type.startsWith('image/')?'image':'document',source:{type:'base64',media_type:file.type,data:await toBase64(file)}});
  }
  content.push({type:'text',text:`これは個別指導Stepの入塾書類です。エントリーシートと中学生成績シートが含まれる場合があります。
読み取れる内容を推測で補いすぎず、次のJSON形式だけで返してください。前置き、説明、Markdownは禁止です。

重要:
- 生徒番号は「生徒番号:」欄の番号です。記入日や西暦2026を生徒番号にしないでください。
- 手書きが読みにくい場合は空欄でよいです。
- 保護者2は右側上部の保護者欄です。これはまだ生徒マスタへ転記せず、確認用に保存します。
- 保護者署名欄より下の、部活動、習い事、通塾方法、ニックネーム、家族情報、要望を重視してください。
- 成績シートがある場合は定期テスト、通知表、志望校を読み取ってください。

{
 "studentId":"",
 "studentName":"",
 "guardian2":{"name":"","kana":"","relation":"","mobile":"","email":"","homePhone":""},
 "entryInfo":{"club":"","currentLessons":"","pastLessons":"","commuteMethod":"","nickname":"","familyRequest":"","signatureDate":"","signatureName":""},
 "family":[{"name":"","relation":"","job":"","workplace":"","grade":""}],
 "scores":[{"year":"","grade":"","term":"","jpn":"","soc":"","math":"","sci":"","eng":"","total5":""}],
 "reports":[{"year":"","grade":"","semester":"","rp_jpn":"","rp_soc":"","rp_math":"","rp_sci":"","rp_eng":"","rp_mus":"","rp_art":"","rp_pe":"","rp_tech":""}],
 "wish":{"pub1name":"","pub1dept":"","pub2name":"","pub2dept":"","priv1name":"","priv1dept":"","priv2name":"","priv2dept":""},
 "notes":""
}`});
  const resp=await fetch(AI_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:'server',model:'claude-opus-4-5',messages:[{role:'user',content}]})});
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const raw=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
  const parsed=JSON.parse(raw);
  normalizeResult(parsed);
  return parsed;
}

function normalizeResult(d){
  d.studentId=String(d.studentId||'').replace(/[^\d]/g,'');
  if(/^20\d{2}$/.test(d.studentId))d.studentId='';
  d.studentName=d.studentName||d.name||'';
  d.guardian2=d.guardian2||{};
  d.entryInfo=d.entryInfo||{};
  d.family=Array.isArray(d.family)?d.family:[];
  d.scores=Array.isArray(d.scores)?d.scores:[];
  d.reports=Array.isArray(d.reports)?d.reports:[];
  d.wish=d.wish||{};
}

function renderResults(){
  const tbody=$('tbody');
  tbody.innerHTML=results.map((r,i)=>{
    if(!r)return '';
    if(r.error)return `<tr><td>${i+1}</td><td colspan="7" style="color:#A32D2D">${esc(r.error)}</td></tr>`;
    const fam=(r.family||[]).filter(f=>f.name||f.relation).map(f=>`${f.name||''} ${f.relation||''}`).join('<br>');
    const g=r.guardian2||{};
    const e=r.entryInfo||{};
    const gw=[g.name,g.relation,g.mobile,g.email].filter(Boolean).join('<br>');
    const score=[(r.scores||[]).length?'定期:'+r.scores.length:'',(r.reports||[]).length?'通知表:'+r.reports.length:'',r.wish&&Object.values(r.wish).some(Boolean)?'志望校あり':''].filter(Boolean).join('<br>');
    return `<tr><td>${i+1}</td><td><b>${esc(r.studentId||'')}</b></td><td>${esc(r.studentName||'')}</td><td>${esc(e.club||'')}</td><td>${fam}</td><td>${esc(gw)}</td><td>${esc(score)}</td><td>${r.studentId?'保存待ち':'生徒番号なし'}</td></tr>`;
  }).join('');
  $('jsonBox').value=JSON.stringify(results,null,2);
  $('resultCard').classList.toggle('hidden',results.length===0);
}

async function saveAll(){
  let ok=0, ng=0;
  $('saveBtn').disabled=true;
  for(const r of results){
    if(!r||r.error||!r.studentId){ng++;continue}
    try{
      say(`${r.studentId} を保存しています...`);
      const pdfUrl=await uploadPdf(r.studentId,fileGroups[0].files);
      const imageUrls=await uploadImages(r.studentId,fileGroups[0].files);
      const payload=buildPayload(r,pdfUrl,imageUrls);
      const res=await api(payload);
      if(!res.success)throw new Error(res.error||'保存失敗');
      ok++;
    }catch(e){ng++;r.error=e.message}
  }
  renderResults();
  say(`保存しました。成功 ${ok} 件 / 失敗 ${ng} 件。\n管理画面の「入塾時情報」で確認してください。`,ok?'ok':'err');
  $('saveBtn').disabled=false;
}

function buildPayload(r,pdfUrl,imageUrls){
  const e=r.entryInfo||{};
  const scores=(r.scores||[]).filter(x=>Object.values(x||{}).some(Boolean));
  const reports=(r.reports||[]).filter(x=>Object.values(x||{}).some(Boolean));
  const wish=(r.wish&&Object.values(r.wish).some(Boolean))?r.wish:null;
  return {
    action:'importEntrySheet',
    studentId:r.studentId,
    name:r.studentName,
    club:e.club||'',
    currentLessons:e.currentLessons||'',
    pastLessons:e.pastLessons||'',
    commuteMethod:e.commuteMethod||'',
    nickname:e.nickname||'',
    familyRequest:e.familyRequest||'',
    signatureDate:e.signatureDate||'',
    signatureName:e.signatureName||'',
    family:r.family||[],
    scores,
    reports,
    wish,
    pdfUrl,
    imageUrl1:imageUrls[0]||'',
    imageUrl2:imageUrls[1]||'',
    ocrMemo:'AI_JSON:'+JSON.stringify(r)
  };
}

async function uploadImages(studentId,files){
  const urls=[];
  for(let i=0;i<Math.min(files.length,2);i++){
    if(!files[i].type.startsWith('image/'))continue;
    const res=await api({action:'uploadEntryImage',studentId,name:'',label:i===0?'entry_sheet':'grade_sheet',imageData:await resizeImage(files[i])});
    if(res.success)urls.push(res.url);
  }
  return urls;
}

async function uploadPdf(studentId,files){
  const pdfFile=files.find(f=>f.type==='application/pdf');
  if(pdfFile){
    const res=await api({action:'uploadEntryPdf',studentId,name:'',pdfData:'data:application/pdf;base64,'+await toBase64(pdfFile)});
    return res.success?res.url:'';
  }
  if(!window.jspdf||!window.jspdf.jsPDF)return '';
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  let pages=0;
  for(const file of files){
    if(!file.type.startsWith('image/'))continue;
    if(pages>0)pdf.addPage();
    const imgData=await resizeImage(file);
    const img=await loadImage(imgData);
    const pageW=210,pageH=297,margin=8;
    const ratio=Math.min((pageW-margin*2)/img.width,(pageH-margin*2)/img.height);
    const w=img.width*ratio,h=img.height*ratio;
    pdf.addImage(imgData,'JPEG',(pageW-w)/2,(pageH-h)/2,w,h);
    pages++;
  }
  if(!pages)return '';
  const res=await api({action:'uploadEntryPdf',studentId,name:'',pdfData:pdf.output('datauristring')});
  return res.success?res.url:'';
}

async function resizeImage(file){
  const dataUrl='data:'+file.type+';base64,'+await toBase64(file);
  const img=await loadImage(dataUrl);
  const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height));
  const canvas=document.createElement('canvas');
  canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
  canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
  return canvas.toDataURL('image/jpeg',.84);
}
function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src})}
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>

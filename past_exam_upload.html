<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>過去問アップロード</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef4f8;color:#142033;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif}
main{max-width:720px;margin:0 auto;padding:28px 16px 48px}
.card{background:#fff;border:1px solid #d7e4ef;border-radius:16px;padding:22px;box-shadow:0 14px 30px rgba(15,35,60,.08)}
h1{font-size:1.45rem;margin:0 0 10px;color:#155aa5}
p{line-height:1.8;margin:10px 0;color:#475569}
.actions{display:grid;gap:12px;margin-top:20px}
button,a.btn{appearance:none;border:0;border-radius:12px;padding:15px 16px;font-size:1rem;font-weight:800;text-align:center;text-decoration:none;cursor:pointer}
.primary{background:#155aa5;color:#fff}
.ghost{background:#edf4fb;color:#155aa5;border:1px solid #c9d8e8}
.small{font-size:.86rem;color:#64748b;word-break:break-all}
.msg{min-height:1.5em;margin-top:12px;font-weight:700;color:#047857}
@media(max-width:520px){main{padding:18px 12px 36px}.card{border-radius:14px;padding:18px}button,a.btn{width:100%}}
</style>
</head>
<body>
<main>
  <section class="card">
    <h1>過去問アップロード</h1>
    <p>スマホで直接開けない場合があるため、このページから開き直します。</p>
    <div class="actions">
      <button class="primary" onclick="openUpload()">過去問アップロードを開く</button>
      <a id="plainLink" class="btn ghost" href="#">長押しして新しいタブで開く</a>
      <button class="ghost" onclick="copyUrl()">URLをコピー</button>
      <a class="btn ghost" href="index.html">職員用トップへ戻る</a>
    </div>
    <div id="msg" class="msg"></div>
    <p class="small" id="urlText"></p>
  </section>
</main>
<script>
const UPLOAD_URL='https://script.google.com/macros/s/AKfycbxqxQOmtwe9lfB0Pt7dKzY3mC2sSRRVG9haDTMvOvrzyQNxhOYQLMTbnxAm9Im3LlXj/exec?page=upload';
document.getElementById('plainLink').href=UPLOAD_URL;
document.getElementById('urlText').textContent=UPLOAD_URL;
function openUpload(){
  const w=window.open(UPLOAD_URL,'_blank','noopener');
  if(!w){
    window.location.href=UPLOAD_URL;
  }
}
async function copyUrl(){
  try{
    await navigator.clipboard.writeText(UPLOAD_URL);
    document.getElementById('msg').textContent='URLをコピーしました。Chromeのアドレス欄へ貼り付けても開けます。';
  }catch(e){
    document.getElementById('msg').textContent='下のURLを長押ししてコピーしてください。';
  }
}
</script>
</body>
</html>
